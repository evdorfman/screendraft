<script>
// Storage shim: the app was built for Claude's artifact sandbox, which
// provides a window.storage key-value API automatically. That doesn't
// exist on a plain static site, so this replaces it with an equivalent
// backed by the browser's own localStorage -- same interface, same
// behavior, data now lives on this device instead.
window.storage = {
  async get(key) {
    const raw = localStorage.getItem('reelink:' + key);
    if (raw === null) throw new Error('Key not found: ' + key);
    return { key, value: raw };
  },
  async set(key, value) {
    localStorage.setItem('reelink:' + key, value);
    return { key, value };
  },
  async delete(key) {
    localStorage.removeItem('reelink:' + key);
    return { key, deleted: true };
  },
  async list(prefix) {
    const p = 'reelink:' + (prefix || '');
    const keys = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && k.startsWith(p)) keys.push(k.slice('reelink:'.length));
    }
    return { keys, prefix };
  },
};

. The animal screams, bolts into the scrub.",8),u("action","Eliza crashes to the ground.",9),u("action","DAX steps from the gloom, a sleek futuristic pistol glowing faintly in his hand.",9),u("action","Calen draws his revolver and fires. Dax answers \u2014 pulses of light ripping through the dusk.",9),u("character","CALEN",9),u("dialogue","Stay down!",9),u("action","Eliza crawls to cover, trapped with him.",9),u("scene_heading","EXT. EDGE OF THE HOMESTEAD \u2013 CONTINUOUS",9),u("action","John crests the hill, sees the firefight unfold. His breath catches.",9),u("character","CALEN",9),u("parenthetical","(shouting)",9),u("dialogue","Barn! Now!",9),u("action","John runs.",9),u("scene_heading","EXT. YARD TO BARN \u2013 CONTINUOUS",9),u("action","Calen and Eliza break from cover, sprinting for the barn. Pulses and bullets crisscross the yard.",9),u("action","A glowing blast slams into Eliza mid-stride. She crumples into the dust.",9),u("action","John skids to a stop, horrified.",9),u("character","JOHN",9),u("dialogue","No!",9),u("action","Calen yanks him, dragging him into the barn as shots shred the doorway.",9),u("scene_heading","INT. BARN \u2013 CONTINUOUS",9),u("action","Calen slams the doors shut. He drops to his knees, pulls up a hidden panel in the floorboards. Inside: a metal lockbox.",9),u("action","He yanks it open \u2014 revealing a futuristic pistol of his own and a compact device that hums with restrained light.",9),u("action","John clutches Anna\u2019s drawing tight, shaking. Through the cracks in the boards, he sees Eliza\u2019s still body.",9),u("action","Outside: crunch of boots on gravel.",10),u("action","Dax approaches, passing her without pause. He mutters, low, unsettled:",10),u("character","DAX",10),u("dialogue","\u2026damn.",10),u("action","The barn doors creak open.",10),u("character","DAX",10),u("dialogue","You can\u2019t keep running, Calen and we both know how many jumps you have left.",10),u("action","Calen raises his weapon. Dax raises his.",10),u("action","They fire \u2014 shrieking pulses tear the rafters, sparks raining down.",10),u("action","John fumbles with the device. It whirs to life, light shimmering into a swelling halo.",10),u("character","JOHN",10),u("dialogue","Dad!",10),u("action","Calen fires a last desperate shot, then grabs John. The shimmer engulfs them.",10),u("action","FLASH\u2014",10),u("scene_heading","EXT. CITY STREET \u2013 DAY (1920S)",10),u("action","A violent discharge of air. CALEN and JOHN tumble into the middle of a crowded street.",10),u("action","A MODEL T FORD barrels toward them, horn blaring.",10),u("action","Calen yanks John back just as the car screeches past, the DRIVER shouting curses out the window.",10),u("action","They stumble to the curb. Around them: men in fedoras, women in cloche hats, trolleys rattling, neon signs buzzing faintly. The noise of the 20th century slams into them at once.",10),u("action","Calen steadies himself, scanning sharp. He moves toward a MAN folding a freshly bought newspaper.",10),u("character","CALEN",10),u("dialogue","Sorry to bother you. What's the date?",10),u("action","The man looks at him, surprised.",11),u("character","MAN",11),u("dialogue","October twenty eighth.",11),u("character","CALEN",11),u("dialogue","Nineteen\u2026?",11),u("action","The man eyes him strangely.",11),u("character","MAN",11),u("dialogue","Twenty-nine.",11),u("action","Calen nods, calculation flickering in his head.",11),u("character","CALEN",11),u("dialogue","And the time?",11),u("character","MAN",11),u("dialogue","Don\u2019t you got a watch?",11),u("action","The man pulls out a pocket watch.",11),u("character","MAN",11),u("dialogue","Quarter to two.",11),u("character","CALEN",11),u("dialogue","Thank you.",11),u("action","The man hesitates, unsettled, but moves on.",11),u("action","John lingers, wide-eyed \u2014 trolleys clanging past, neon buzzing, a jazz tune spilling from a storefront phonograph.",11),u("character","JOHN",11),u("dialogue","Are we in the future?",11),u("action","The man overhears, frowns.",11),u("action","Calen forces a tight smile.",11),u("character","CALEN",11),u("dialogue","Kids. Thanks again.",11),u("action","He steers John away. Once they\u2019re clear, John leans close, voice lowered.",11),u("character","JOHN",11),u("parenthetical","(quietly)",11),u("dialogue","Is this when you\u2019re from?",11),u("action","Calen\u2019s jaw hardens.",12),u("character","CALEN",12),u("dialogue","No. Keep moving. This way.",12),u("action","He grips John\u2019s shoulder, guiding him down the block.",12),u("scene_heading","INT. SAFE HOUSE APARTMENT \u2013 NIGHT (1920S)",12),u("action","Dust hangs in the air. Calen forces the door open, locks it tight behind them.",12),u("action","He moves straight to a warped floorboard, pries it up. Inside: a cache \u2014 cash bound in twine, clothes wrapped in paper, a revolver in oil cloth, a primitive radio.",12),u("action","John watches, unsettled.",12),u("character","JOHN",12),u("dialogue","How do you\u2026 how do you know this place?",12),u("action","Calen doesn\u2019t answer. He unwraps the bundles of cash, pulls out a portion \u2014 just enough to fill his coat pocket \u2014 then rewraps the rest and tucks it back into the floor.",12),u("action","He checks the revolver, oils it with quick, sure hands. Pulls out two coats, tosses one to John.",12),u("character","CALEN",12),u("dialogue","Put it on.",12),u("action","John slips into the coat, the weight awkward. He studies his father.",12),u("character","JOHN",12),u("dialogue","We\u2019ve been running so long. You always know where to go. Like you\u2019ve done this before.",12),u("action","Calen winds a pocket watch, checks it. His eyes flick toward the door, calculating.",12),u("character","CALEN",12),u("dialogue","Two days. That\u2019s all we can risk in this time.",12),u("character","JOHN",12),u("dialogue","Two days and then what? We run again?",12),u("character","CALEN",13),u("dialogue","We survive.",13),u("character","JOHN",13),u("dialogue","How do you know all this? The hiding, the safe houses, the rules? Where does it come from?",13),u("action","A silence. Calen finally looks at him \u2014 face hard, weary.",13),u("character","CALEN",13),u("dialogue","Because I used to be like them.",13),u("action","Before John can respond \u2014 FOOTSTEPS on the stairs. Voices. A key scraping at the lock.",13),u("action","Calen blows out the lamp, grabs John by the arm.",13),u("character","CALEN",13),u("dialogue","Fire escape. Now.",13),u("action","They slip through the window, vanish down the rattling metal steps.",13),u("action","A beat later, the door creaks open.",13),u("action","A MAN enters, silhouetted by the glow of the hallway. He hangs his coat, crosses to the cache with practiced ease.",13),u("action","He kneels. The light catches his face \u2014 Calen, ten years younger.",13),u("scene_heading","EXT. HOMESTEAD \u2013 DUSK (1880S)",13),u("action","The yard is still. ELIZA\u2019S body lies crumpled near the fence, her dress torn by gunfire.",13),u("action","DAX crouches beside her, activating a recording device. A faint red light blinks.",13),u("character","DAX (INTO DEVICE)",13),u("dialogue","Field report. Subject Calen escaped the engagement. One local casualty \u2014 adult female, schoolteacher.",13),u("action","He passes the device slowly over her body. A soft pulse of blue light scans her, faint data scrolling on the recorder. It beeps once it collects enough data.",13),u("character","DAX",14),u("parenthetical","(into device)",14),u("dialogue","Submitting scan. Requesting assessment: long-term impact on the timeline.",14),u("action","He studies her for a moment \u2014 detached, clinical.",14),u("character","DAX",14),u("parenthetical","(into device)",14),u("dialogue","Moving inside.",14),u("action","Dax stands, shuts off the scan, and heads toward the house.",14),u("scene_heading","INT. HOMESTEAD \u2013 DUSK (1880S)",14),u("action","Dax steps inside. His boots crunch on broken glass. He surveys the room:",14),u("action","Worn boots by the door.",14),u("action","A stack of hand-cut firewood.",14),u("action","Slate with chalk markings on the table.",14),u("character","DAX (INTO DEVICE)",14),u("dialogue","They\u2019ve been here a while. Years. Settled in.",14),u("action","He kneels, pries up a floorboard. Beneath: the charred husk of the dampener. He lifts it, turning it in his hands.",14),u("character","DAX",14),u("parenthetical","(into device)",14),u("dialogue","Remnants of a dampening device. Primitive, but effective. Ingenious adaptation to local power. Bought himself time.",14),u("action","He sets it down, straightens.",14),u("character","DAX",14),u("parenthetical","(into device)",14),u("dialogue","Requesting a list of high-traffic temporal markers in this sector.",14),u("action","He ends the recording, presses a recessed button. The device unfolds spider-like legs and begins to burrow into the earth.",14),u("action","Dax pulls out a secondary handheld \u2014 a readout screen linked to the recorder. Numbers flicker across.",14),u("action","ON SCREEN: Depth: 10 meters\u2026 20\u2026 50.",15),u("action","At last, a green light. STATUS: SECURE FOR PICKUP.",15),u("action","A shimmer. A return capsule materializes from nothing, settling on the ground.",15),u("action","Dax retrieves it, attaches it to the secondary device. An audio message crackles to life.",15),u("character","AGENCY VOICE (V.O.)",15),u("dialogue","Field report received. Subject female casualty: minimal impact on long-term structures. Proceed with caution. Avoid unnecessary additional casualties.",15),u("action","A pause.",15),u("character","AGENCY VOICE (V.O.)",15),u("dialogue","Uploading temporal traffic clusters\u2026",15),u("action","The screen flickers alive with a cascade of roughly a hundred entries \u2014 each tethered to a pivotal moment in history or the near future. They roll past in dense succession: Thermopylae, 480 B.C. \u2026 Hastings, 1066 \u2026 Versailles, 1789 \u2026 Gettysburg, 1863 \u2026 Normandy, 1944 \u2026 Berlin, 1989 \u2026 New York, 2001 \u2026 Geneva, 2025\u2026",15),u("action","The data keeps streaming, a flood of history compressed into cold coordinates.",15),u("character","DAX",15),u("dialogue","He\u2019d go somewhere he knows.",15),u("action","He switches modes \u2014 pulls up another dataset: Calen\u2019s known operations.",15),u("action","ON SCREEN:",15),u("action","Rome,44B.C.",15),u("action","Austria,1889",15),u("action","NewYork,1929",15),u("action","Poland,1939",15),u("action","Beijing,1989",15),u("action","WashingtonD.C.,2031",15),u("action","Dax studies them, focused. His gaze locks on New York, 1929.",16),u("character","DAX",16),u("dialogue","That\u2019s where he\u2019d go.",16),u("action","He readies his travel device. A surge of light builds.",16),u("action","FLASH\u2014",16),u("action","Dax is gone. The homestead stands silent.",16),u("scene_heading","INT. AUTOMAT \u2013 NIGHT (1920S)",16),u("action","Rows of gleaming glass compartments line the walls. Behind each, pies, sandwiches, and steaming plates wait under golden light. Customers jingle nickels into slots, doors click open, food is claimed. The room hums with chatter, trays clattering, coffee pouring.",16),u("action","John and Calen step inside. John stares at the walls of food, suspicious.",16),u("character","JOHN",16),u("dialogue","This is where people eat? Out of a wall?",16),u("action","Calen almost smiles. He steers John toward a row, pulls a few coins from his pocket.",16),u("character","CALEN",16),u("dialogue","Not just any wall. You\u2019re looking at the future.",16),u("action","He slides coins into a slot. A little door pops open, revealing a steaming dish of macaroni and cheese. Calen sets it down with a fork.",16),u("action","He grabs a glass-bottle Coca-Cola from the marble counter, plunks it down next to the tray.",16),u("character","CALEN",16),u("dialogue","Drink.",16),u("action","John twists off the cap, takes a sip. His eyes widen at the fizz and sweetness.",16),u("character","JOHN",16),u("dialogue","It\u2019s\u2026 sharp. Sweet.",16),u("action","Calen takes a swig for himself, nodding.",16),u("character","CALEN",17),u("dialogue","Doesn\u2019t exist in your time. Doesn\u2019t exist in mine. Just here. Just now. One of life\u2019s fleeting pleasures.",17),u("action","John digs into the macaroni, surprised.",17),u("character","JOHN",17),u("dialogue","It\u2019s good.",17),u("action","Calen leans in, voice low.",17),u("character","CALEN",17),u("dialogue","But remember the rules. Keep your head down. Limit interactions. Don\u2019t get close.",17),u("action","John frowns.",17),u("character","JOHN",17),u("dialogue","Because of cause and effect.",17),u("action","Calen gestures subtly at a MAN nearby \u2014 middle-aged, reading his paper, eating quietly alone.",17),u("character","CALEN",17),u("dialogue","Say I talk to him. Just a little small talk. He leaves late, misses his streetcar.",17),u("action","John listens, chewing slower.",17),u("character","CALEN",17),u("dialogue","He catches the next one instead. Meets someone new. Takes a job he wasn\u2019t meant to. The man who should\u2019ve had it goes another way. Maybe he drinks too much, maybe he dies. And with him, the idea that could\u2019ve saved lives. That\u2019s how small it is.",17),u("action","John sets his fork down, unsettled.",17),u("character","JOHN",17),u("dialogue","What about Eliza? Why can\u2019t we go back and stop that?",17),u("action","Calen stiffens. He sets his Coke down carefully, his tone clinical, as though repeating something drilled into him.",17),u("character","CALEN",18),u("dialogue","Because once a round\u2019s discharged from one of these weapons, the energy collapse locks the outcome. The death is fused into the timeline. You could revisit it a thousand times, and she\u2019d still fall. The bullet already made the decision.",18),u("action","John\u2019s voice drops.",18),u("character","JOHN",18),u("dialogue","So she\u2019s just\u2026 gone.",18),u("character","CALEN",18),u("dialogue","Yes.",18),u("action","Calen leans closer, his tone steady \u2014 building the rules one by one:",18),u("character","CALEN",18),u("dialogue","Never take the last of anything. The person after you was meant to have it \u2014 you change their path.",18),u("dialogue","Limit interactions. Every word you speak is a branch you can\u2019t control.",18),u("dialogue","Avoid crowds. More people, more chance of impact.",18),u("dialogue","Even something small \u2014 like standing in a doorway. You block one step, and the whole sequence shifts.",18),u("dialogue","Be polite, but not overly polite. Courtesy is forgettable. Kindness is remembered.",18),u("dialogue","Leave everything how you found it. A chair, a coin, a tool \u2014 it all belongs to someone.",18),u("dialogue","And never give advice. Even the smallest suggestion can reroute a life.",18),u("action","John studies him \u2014 uneasy, but curious. Calen holds his gaze, finishing the thought:",18),u("character","CALEN",19),u("dialogue","The truth is \u2014 us being here at all changes things. Every breath we take, every inch of space we fill\u2026 the future shifts. Our job is to make that shift as small as possible.",19),u("action","A heavy silence. John sits with the weight of it, then:",19),u("character","JOHN",19),u("dialogue","And you used to do this for them.",19),u("action","Calen doesn\u2019t deny it.",19),u("character","JOHN",19),u("dialogue","So what was your mission here?",19),u("action","Calen takes a long pull from the Coke, sets the bottle down with a dull clink.",19),u("character","CALEN",19),u("dialogue","Names on a page. Orders from above. My job wasn\u2019t to ask why.",19),u("action","John tilts his head, testing him.",19),u("character","JOHN",19),u("dialogue","But you know.",19),u("action","Calen\u2019s eyes flicker, something dark there, then he looks away.",19),u("character","CALEN",19),u("dialogue","Some things are better left buried.",19),u("action","John leans back, appetite gone.",19),u("character","JOHN",19),u("dialogue","Sounds like you were just another ripple.",19),u("action","Calen doesn\u2019t answer. The clatter of trays and the hum of voices fill the silence between them.",19),u("scene_heading","INT. HOTEL LOBBY \u2013 NIGHT (1920S)",19),u("action","A modest but respectable hotel. Worn rugs. Brass fixtures dulled by time. A couple of traveling salesmen check in, a family lingers on the couches, kids restless.",19),u("action","Calen and John step inside, carrying only what they brought.",19),u("action","John looks around, wide-eyed \u2014 to him, even \u201Cmid-tier\u201D feels grand.",20),u("action","They approach the front desk. The CLERK, mid-30s, tired eyes, looks up.",20),u("character","CALEN",20),u("dialogue","Evening. How full are you tonight?",20),u("action","The clerk frowns slightly.",20),u("character","CLERK",20),u("dialogue","About half. Why?",20),u("action","Calen just nods, slides coins across.",20),u("character","CALEN",20),u("dialogue","We\u2019ll take a room. One night.",20),u("action","The clerk reaches for the bell.",20),u("character","CLERK",20),u("dialogue","I\u2019ll have the boy\u2014",20),u("character","CALEN",20),u("dialogue","No. We\u2019ll carry our own. No room service either. We won\u2019t be needing anyone coming by.",20),u("action","A brief silence. The clerk blinks, then nods, handing over the key. Calen thanks him \u2014 polite, but clipped.",20),u("action","John watches, the refusal sticking with him. His eyes drift back toward the families in the lobby \u2014 kids laughing, parents hushing them \u2014 the kind of life they can\u2019t have.",20),u("action","Calen gestures, and they head for the stairs, carrying their own things. John lingers one beat longer, reluctant to turn his back on the warmth of the room.",20),u("scene_heading","INT. HOTEL ROOM \u2013 NIGHT (1920S)",20),u("action","A modest room. Two narrow beds. A wardrobe. A single lamp         @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap');

        :root{
          --ink:#14171C; --panel:#1B1F26; --panel2:#20242C; --border:#2B303A;
          --paper:#FBF9F4; --text:#E7E3DA; --muted:#8B93A1;
          --amber:#C98A3E; --amber-soft:#E3B172; --teal:#3E7C8C;
        }
        .rw-root{ min-height:100vh; background:var(--ink); color:var(--text); font-family:'IBM Plex Sans',sans-serif; display:flex; }
        *{ box-sizing:border-box; }
        button{ font-family:inherit; cursor:pointer; }

        /* ---------- Left sidebar: projects ---------- */
        .rw-sidebar{ width:270px; flex-shrink:0; background:var(--panel); border-right:1px solid var(--border); display:flex; flex-direction:column; height:100vh; position:sticky; top:0; z-index:35; }
        .rw-brand{ padding:20px 18px 14px; border-bottom:1px solid var(--border); }
        .rw-brand-mark{ display:flex; align-items:center; gap:8px; }
        .rw-reel{ width:20px; height:20px; border-radius:50%; border:3px solid var(--amber); position:relative; flex-shrink:0; }
        .rw-reel::before{ content:''; position:absolute; inset:4px; border-radius:50%; background:var(--amber); opacity:.5; }
        .rw-brand-name{ font-weight:700; letter-spacing:.02em; font-size:15px; }
        .rw-brand-sub{ color:var(--muted); font-size:11px; margin-top:2px; letter-spacing:.08em; text-transform:uppercase; }
        .rw-newbtn{ margin:14px 18px 8px; background:var(--amber); color:#1a1305; border:none; border-radius:8px; padding:10px 12px; font-weight:600; font-size:13px; }
        .rw-newbtn:hover{ background:var(--amber-soft); }
        .rw-importbtn{ margin:0 18px 14px; background:var(--panel2); color:var(--text); border:1px solid var(--border); border-radius:8px; padding:9px 12px; font-weight:600; font-size:13px; }
        .rw-importbtn:hover{ border-color:var(--teal); color:var(--teal); }
        .rw-importbtn:disabled{ opacity:.6; cursor:wait; }
        .rw-importerror{ margin:0 18px 12px; font-size:11px; color:#e08a8a; line-height:1.4; }
        .rw-importbanner{ display:flex; align-items:center; justify-content:space-between; gap:12px; background:rgba(62,124,140,.15); border:1px solid rgba(62,124,140,.4); border-radius:10px; padding:10px 14px; margin-bottom:14px; font-family:'IBM Plex Sans',sans-serif; font-size:12.5px; color:var(--text); max-width:8.5in; width:100%; }
        .rw-importbanner button{ background:var(--teal); color:#0e2126; border:none; border-radius:6px; padding:6px 10px; font-size:11.5px; font-weight:600; white-space:nowrap; }
        .rw-importbanner .rw-dismiss{ background:none; color:var(--muted); padding:4px 6px; }
        .sp-flagged{ background:rgba(201,138,62,.14); box-shadow:inset 3px 0 0 var(--amber); border-radius:2px; }
        .sp-reading{ background:rgba(62,124,140,.22); box-shadow:inset 3px 0 0 var(--teal); border-radius:2px; }
        .rw-projects{ flex:1; overflow-y:auto; padding:6px 10px; }
        .rw-project{ padding:10px 10px; border-radius:8px; cursor:pointer; margin-bottom:2px; display:flex; justify-content:space-between; align-items:center; gap:6px; }
        .rw-project:hover{ background:var(--panel2); }
        .rw-project.active{ background:var(--panel2); box-shadow:inset 2px 0 0 var(--amber); }
        .rw-project-title{ font-size:13px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        .rw-project-del{ opacity:0; background:none; border:none; color:var(--muted); font-size:14px; }
        .rw-project:hover .rw-project-del{ opacity:1; }
        .rw-sidebar-footer{ padding:14px 18px; border-top:1px solid var(--border); font-size:11px; color:var(--muted); }

        /* ---------- Right panel: scenes / versions ---------- */
        .rw-navpanel{ width:290px; flex-shrink:0; background:var(--panel); border-left:1px solid var(--border); height:100vh; position:sticky; top:0; display:flex; flex-direction:column; z-index:35; }
        .rw-navtabs{ display:flex; gap:2px; background:var(--panel2); padding:3px; border-radius:8px; margin:14px; }
        .rw-navtab{ flex:1; background:none; border:none; color:var(--muted); font-size:12px; padding:7px 8px; border-radius:6px; }
        .rw-navtab.active{ background:var(--amber); color:#1a1305; font-weight:600; }
        .rw-navlist{ flex:1; overflow-y:auto; padding:0 14px 14px; }
        .rw-scene-item{ padding:10px 10px; border-radius:8px; cursor:pointer; margin-bottom:4px; border:1px solid transparent; }
        .rw-scene-item:hover{ background:var(--panel2); border-color:var(--border); }
        .rw-scene-num{ color:var(--amber); font-size:10px; font-weight:700; letter-spacing:.05em; }
        .rw-scene-heading{ font-family:'Courier Prime',monospace; font-size:12px; margin-top:2px; line-height:1.3; }
        .rw-scene-page{ color:var(--muted); font-size:10px; margin-top:3px; }
        .rw-empty{ color:var(--muted); font-size:12px; padding:20px 6px; text-align:center; }
        .rw-savever{ margin:0 14px 12px; background:var(--teal); color:#0e2126; border:none; border-radius:8px; padding:9px 10px; font-weight:600; font-size:12px; }
        .rw-version-item{ padding:10px; border-radius:8px; margin-bottom:6px; background:var(--panel2); border:1px solid var(--border); }
        .rw-version-label{ font-size:12.5px; font-weight:600; }
        .rw-version-date{ color:var(--muted); font-size:10px; margin:2px 0 8px; }
        .rw-version-actions{ display:flex; gap:6px; }
        .rw-version-actions button{ flex:1; background:var(--ink); border:1px solid var(--border); color:var(--text); border-radius:6px; padding:5px 6px; font-size:11px; }
        .rw-version-actions button:hover{ border-color:var(--amber); color:var(--amber-soft); }
        .rw-version-actions button.danger:hover{ border-color:#c95d5d; color:#e08a8a; }

        /* ---------- Topbar ---------- */
        .rw-main{ flex:1; min-width:0; display:flex; flex-direction:column; height:100vh; overflow:hidden; }
        .rw-topbar{ display:flex; align-items:center; gap:8px; padding:10px 16px; border-bottom:1px solid var(--border); background:var(--panel); flex-wrap:wrap; }
        .rw-hamb{ display:none; background:none; border:1px solid var(--border); color:var(--text); border-radius:6px; width:34px; height:34px; flex-shrink:0; }
        .rw-title-field{ background:transparent; border:none; color:var(--text); font-size:15px; font-weight:600; outline:none; flex:1; min-width:80px; }
        .rw-tabs{ display:flex; gap:2px; background:var(--panel2); padding:3px; border-radius:8px; flex-shrink:0; }
        .rw-tab{ background:none; border:none; color:var(--muted); font-size:12px; padding:6px 12px; border-radius:6px; }
        .rw-tab.active{ background:var(--amber); color:#1a1305; font-weight:600; }
        .rw-iconbtn{ background:var(--panel2); border:1px solid var(--border); color:var(--text); border-radius:8px; padding:8px 12px; font-size:12px; font-weight:600; white-space:nowrap; }
        .rw-iconbtn:hover{ border-color:var(--amber); color:var(--amber-soft); }
        .rw-iconbtn.on{ border-color:var(--amber); color:var(--amber-soft); }
        .rw-export{ background:var(--teal); color:#0e2126; border:none; border-radius:8px; padding:8px 14px; font-weight:600; font-size:13px; white-space:nowrap; }
        .rw-export:hover{ filter:brightness(1.1); }

        /* ---------- Page canvas ---------- */
        .rw-canvas{ flex:1; overflow-y:auto; padding:36px 20px 24px; display:flex; flex-direction:column; align-items:center; gap:28px; }
        .rw-page{ width:100%; max-width:8.5in; min-height:11in; background:var(--paper); color:#111; box-shadow:0 10px 40px rgba(0,0,0,.45); padding:1in 1in 1in 1.5in; font-family:'Courier Prime',monospace; font-size:12pt; line-height:13pt; position:relative; }
        .rw-pagebadge{ position:absolute; top:.45in; right:1in; font-size:10pt; color:#8a8474; }
